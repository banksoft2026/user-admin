server:
  port: 8084

spring:
  application:
    name: user-admin
  datasource:
    url: jdbc:postgresql://localhost:5432/user_admin_db
    username: postgres
    password: banksoft@2026
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  jwt:
    secret: banksoft2026-jwt-secret-key-user-admin-service-very-long-secret-2026
    expiry-ms: 900000
    refresh-expiry-ms: 28800000
  cors:
    allowed-origins: "http://localhost:3000,http://localhost:5173,http://localhost:4000"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info
